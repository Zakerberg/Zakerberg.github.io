# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: Cherry
subtitle: ""
description: "Cherry 键盘资料库，整理 Cherry 古董键盘型号、图册、PDF 资料与收藏记录。"
keywords: "Cherry, CHERRY Keyboard, 樱桃键盘, 古董键盘, 机械键盘, 型号图鉴, PDF资料"
author: Michael Bai
language: zh-CN
# timezone: ''

# URL
url: https://zakerberg.github.io
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ""
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ""
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ""

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ""
  per_page: 60
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

seo:
  home_h1: 向 Walter·L·Cherry 先生致敬
  cover_h1: Cherry 键盘资料库
  default_og_image: /medias/banner/0.jpg

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: "mtime"

# Pagination
per_page: 6
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
# include:
# exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: hexo-theme-matery

# Deployment
deploy:
  type: git
  repo:
    github: git@github.com:Zakerberg/Zakerberg.github.io.git
  branch: master

# Search
search:
  path: search.xml
  field: post

# SEO
feed:
  type: atom
  path: atom.xml
  limit: 20
  content: true
  content_limit: 500

sitemap:
  path: sitemap.xml
  rel: false
  tags: true
  categories: true

permalink_pinyin:
  enable: true
  separator: "-" # default: '-'

githubEmojis:
  enable: true
  className: github-emoji
  inject: true
  styles:
  customEmojis:
